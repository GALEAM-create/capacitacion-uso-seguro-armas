<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sitio en mantenimiento</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#071826,#103552,#1b5d84);
overflow:hidden;
color:white;
text-align:center;

}

/* Contenido */

.contenedor{

position:relative;
z-index:10;
max-width:700px;
padding:40px;

}

.logo{

width:110px;
margin-bottom:35px;

}

.engrane{

font-size:70px;
animation:girar 8s linear infinite;
margin-bottom:20px;

}

h1{

font-size:52px;
font-weight:800;
margin-bottom:15px;

}

p{

font-size:20px;
opacity:.85;
line-height:1.6;

}

small{

display:block;
margin-top:35px;
opacity:.55;
font-size:15px;

}

@keyframes girar{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

</style>

</head>

<body>

<div class="contenedor">

<img src="logo.png" class="logo">

<div class="engrane">⚙️</div>

<h1>Sitio en mantenimiento</h1>

<p>
Estoy realizando modificaciones a la pagina.
<br><br>
El sitio estará disponible nuevamente muy pronto.
</p>

<small>
mejor esucha musica mientras esperas.
</small>

</div>

</body>
</html>
